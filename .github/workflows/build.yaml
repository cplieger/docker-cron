name: Build and Push
on:
  push:
    branches: [main]
    paths: ['Dockerfile', '*.sh', 'lib/**']
  workflow_dispatch:
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@v1
    with:
      registries: "ghcr,dockerhub"
      notify-repo: "cplieger/homelab"
      platforms: "linux/amd64,linux/arm64"
    secrets: inherit
