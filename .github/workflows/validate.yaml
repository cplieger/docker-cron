name: Validate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Lint shell scripts
        run: shellcheck -x -S info *.sh lib/shell/*.sh
      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:2.12.0 \
            hadolint --ignore DL3018 --ignore DL3008 - < Dockerfile
      - name: Scan for secrets
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-banner
      - name: Scan for secrets
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-banner
      - name: Scan for secrets
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-banner
      - name: Scan for secrets
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
